name: havix_mobile
description: "Havix white-label mobile storefront."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  provider: ^6.1.2
  go_router: ^13.2.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  cached_network_image: ^3.3.1
  flutter_html: ^3.0.0-beta.2
  photo_view: ^0.15.0
  smooth_page_indicator: ^1.1.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  url_launcher: ^6.2.5
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  local_auth: ^2.3.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/splash/
