workflows:

  # ─── Android Build ────────────────────────────────────────────────────────
  android-tenant-build:
    name: Android — Tenant Build
    max_build_duration: 30
    instance_type: linux_x2  # Linux runner (barato, suficiente para Android)

    environment:
      flutter: stable
      vars:
        API_BASE_URL: https://api.havix.com       
        TENANT_ID: 82e25f39-b50a-4d9e-9ece-7ac8c7ff6bcc          
        APP_NAME: Havix                    
        BUNDLE_ID_ANDROID: com.havix.app       
        BUNDLE_ID_IOS:  com.havix.app            

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android .aab
        script: ./scripts/build_android.sh

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab

    publishing:
      email:
        recipients:
          - daniel.moreira.rufino@gmail.com
        notify:
          success: true
          failure: true

  # ─── iOS Build ────────────────────────────────────────────────────────────
  ios-tenant-build:
    name: iOS — Tenant Build
    max_build_duration: 60
    instance_type: mac_mini_m2  # macOS obrigatório para iOS

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE_URL: https://api.havix.com
        TENANT_ID: 82e25f39-b50a-4d9e-9ece-7ac8c7ff6bcc
        APP_NAME: Havix
        BUNDLE_ID_ANDROID: com.cliente.loja
        BUNDLE_ID_IOS: com.cliente.loja
        APPLE_TEAM_ID: COLE_O_TEAM_ID_AQUI       # do Apple Developer Account
      # Certificados iOS — configurados no painel do Codemagic
      ios_signing:
        distribution_type: app_store
        bundle_identifier: $BUNDLE_ID_IOS

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS .ipa
        script: ./scripts/build_ios.sh

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - daniel.moreira.rufino@gmail.com
        notify:
          success: true
          failure: true
